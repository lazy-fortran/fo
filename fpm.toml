name = "fo"
version = "0.1.0"
license = "MIT"
author = "Christopher Albert"
maintainer = "albert@tugraz.at"
copyright = "Copyright 2025, Christopher Albert"
description = "Fortran build cache, incremental rebuild, affected-test selection, MCP server"

[build]
auto-executables = true
auto-tests = true
auto-examples = false
module-naming = false

[install]
library = false

[dependencies]
fpm = { git = "https://github.com/krystophny/fpm.git", branch = "main" }
fx = { git = "git@github.com:lazy-fortran/fx.git", branch = "main" }

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"
